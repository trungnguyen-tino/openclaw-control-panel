name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: pip install -r requirements-dev.txt
      - run: pytest
      - run: cd ui && npm ci && npm run build
      - run: bash scripts/build-release-tarball.sh ${GITHUB_REF_NAME}
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openclaw-panel-${{ github.ref_name }}.tar.gz
            dist/openclaw-panel-${{ github.ref_name }}.tar.gz.sha256
