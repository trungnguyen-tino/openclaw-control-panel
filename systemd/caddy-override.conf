[Service]
EnvironmentFile=/opt/openclaw/.env
ExecStart=
ExecStart=/usr/bin/caddy run --environ --config /opt/openclaw/Caddyfile --adapter caddyfile
# Default ExecReload points at /etc/caddy/Caddyfile — that file is empty on
# our hosts, so `systemctl reload caddy` would silently load nothing and
# drop the :443 listener. Pin reload to our config too.
ExecReload=
ExecReload=/usr/bin/caddy reload --config /opt/openclaw/Caddyfile --adapter caddyfile --force
