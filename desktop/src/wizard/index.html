<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>OpenClaw — Cài đặt lần đầu</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #0b0e14;
        color: #d6deeb;
        line-height: 1.5;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p.lede {
        color: #9aa6c4;
        margin: 0 0 24px;
      }
      ol.steps {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      ol.steps li {
        padding: 10px 12px;
        border-left: 3px solid #2c3344;
        margin-bottom: 6px;
        color: #5e6a87;
        transition: all 0.2s;
      }
      ol.steps li.active {
        border-left-color: #38bdf8;
        color: #d6deeb;
        background: #11161f;
      }
      ol.steps li.done {
        border-left-color: #22c55e;
        color: #9aa6c4;
      }
      ol.steps li.failed {
        border-left-color: #ef4444;
        color: #fecaca;
      }
      pre.log {
        margin-top: 24px;
        padding: 12px;
        background: #060810;
        border: 1px solid #1b2030;
        border-radius: 6px;
        font-size: 11px;
        max-height: 160px;
        overflow-y: auto;
        color: #8b96b0;
        white-space: pre-wrap;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
      }
      button {
        padding: 10px 16px;
        background: #1f2937;
        color: #d6deeb;
        border: 1px solid #2c3344;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      button.primary {
        background: #2563eb;
        border-color: #2563eb;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .preflight {
        display: none;
        margin-top: 24px;
        padding: 16px;
        background: #1e1b13;
        border: 1px solid #5b3a0e;
        border-radius: 6px;
      }
      .preflight.show {
        display: block;
      }
      .preflight .hint {
        color: #fde68a;
        margin: 0 0 12px;
        font-size: 13px;
      }
      .preflight pre {
        margin: 0 0 12px;
        padding: 10px;
        background: #0b0e14;
        border-radius: 4px;
        font-size: 12px;
        color: #d6deeb;
        user-select: all;
      }
      .preflight .row {
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Đang chuẩn bị OpenClaw cho lần đầu sử dụng</h1>
    <p class="lede" id="lede">…</p>

    <ol class="steps" id="steps"></ol>

    <div class="preflight" id="preflight">
      <p class="hint" id="preflightHint"></p>
      <pre id="preflightCmd"></pre>
      <div class="row">
        <button id="openTerminal">Mở Terminal</button>
        <button id="copyCmd">Copy lệnh</button>
        <button id="preflightContinue" class="primary">Đã chạy xong — Tiếp tục</button>
      </div>
    </div>

    <pre class="log" id="log"></pre>

    <div class="actions">
      <button id="retry" disabled>Thử lại</button>
      <button id="reboot" class="primary" style="display: none" onclick="window.close()">
        Đã hiểu — restart Windows
      </button>
      <button id="close" class="primary" style="display: none" onclick="window.close()">
        Hoàn tất
      </button>
    </div>

    <script>
      // ─── Platform-aware step list ──────────────────────────────────
      // Linux  : probe → preflight → run_bootstrap → healthcheck
      // Win32  : probe → install_wsl → install_distro → provision_distro → run_bootstrap → healthcheck
      const STEPS_BY_PLATFORM = {
        linux: [
          { key: "probe", label: "Kiểm tra hệ thống" },
          { key: "preflight", label: "Kiểm tra công cụ (curl, pkexec)" },
          { key: "run_bootstrap", label: "Cài OpenClaw + dependencies (cần password)" },
          { key: "healthcheck", label: "Kiểm tra hoạt động" },
        ],
        win32: [
          { key: "probe", label: "Kiểm tra hệ thống" },
          { key: "install_wsl", label: "Cài WSL2 (cần restart sau)" },
          { key: "install_distro", label: "Tải Ubuntu 22.04" },
          { key: "provision_distro", label: "Cấu hình distro" },
          { key: "run_bootstrap", label: "Cài OpenClaw backend" },
          { key: "healthcheck", label: "Kiểm tra hoạt động" },
        ],
      };

      const ledeText = {
        linux:
          "OpenClaw sẽ tự cài Node, Python, Caddy + openclaw lên máy bạn. Cần password sudo 1 lần.",
        win32:
          "OpenClaw cần WSL2 + Ubuntu để chạy backend. Quá trình này diễn ra tự động — chỉ làm 1 lần.",
      };

      const platform = window.openclawWizard.platform;
      const stepsEl = document.getElementById("steps");
      const logEl = document.getElementById("log");
      const ledeEl = document.getElementById("lede");
      const retryBtn = document.getElementById("retry");
      const rebootBtn = document.getElementById("reboot");
      const closeBtn = document.getElementById("close");
      const preflightEl = document.getElementById("preflight");
      const preflightHint = document.getElementById("preflightHint");
      const preflightCmd = document.getElementById("preflightCmd");
      const preflightContinue = document.getElementById("preflightContinue");

      ledeEl.textContent = ledeText[platform] ?? ledeText.linux;
      const steps = STEPS_BY_PLATFORM[platform] ?? STEPS_BY_PLATFORM.linux;
      for (const s of steps) {
        const li = document.createElement("li");
        li.dataset.step = s.key;
        li.textContent = s.label;
        stepsEl.appendChild(li);
      }

      function setStepClass(stepName, cls) {
        for (const li of stepsEl.querySelectorAll("li")) {
          if (li.dataset.step === stepName) li.classList.add(cls);
        }
      }
      function markDoneBefore(stepName) {
        const stepEls = [...stepsEl.querySelectorAll("li")];
        const idx = stepEls.findIndex((el) => el.dataset.step === stepName);
        for (let i = 0; i < idx; i++) stepEls[i].classList.add("done");
      }

      // ─── Event handlers ────────────────────────────────────────────

      window.openclawWizard.onStep(({ step }) => {
        if (step === "done" || step === "failed" || step === "reboot_required") return;
        markDoneBefore(step);
        setStepClass(step, "active");
      });

      window.openclawWizard.onLog(({ text }) => {
        logEl.textContent += text;
        logEl.scrollTop = logEl.scrollHeight;
      });

      window.openclawWizard.onPreflight(({ hint, installCommand }) => {
        preflightHint.textContent = hint;
        preflightCmd.textContent = installCommand;
        preflightEl.classList.add("show");
      });

      window.openclawWizard.onReboot(() => {
        for (const li of stepsEl.querySelectorAll("li")) li.classList.add("done");
        rebootBtn.style.display = "inline-block";
      });

      window.openclawWizard.onDone(() => {
        for (const li of stepsEl.querySelectorAll("li")) li.classList.add("done");
        closeBtn.style.display = "inline-block";
      });

      window.openclawWizard.onError(({ message }) => {
        const active = stepsEl.querySelector("li.active");
        if (active) active.classList.replace("active", "failed");
        logEl.textContent += "\n❌ " + message + "\n";
        retryBtn.disabled = false;
      });

      // ─── Buttons ───────────────────────────────────────────────────

      function resetAndRetry() {
        for (const li of stepsEl.querySelectorAll("li")) li.className = "";
        logEl.textContent = "";
        preflightEl.classList.remove("show");
        retryBtn.disabled = true;
        window.openclawWizard.retry();
      }

      retryBtn.addEventListener("click", resetAndRetry);
      preflightContinue.addEventListener("click", resetAndRetry);

      document.getElementById("openTerminal").addEventListener("click", () => {
        window.openclawWizard.openTerminal();
      });
      document.getElementById("copyCmd").addEventListener("click", async () => {
        await navigator.clipboard.writeText(preflightCmd.textContent);
      });
    </script>
  </body>
</html>
